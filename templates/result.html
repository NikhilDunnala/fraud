<!DOCTYPE html>
<html>
<head>
    <title>Fraud Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">💳 Fraud Detection Dashboard</h2>

    <!-- STATS CARDS -->
    <div class="row text-center mb-4">

        <div class="col-md-3">
            <div class="card shadow bg-primary text-white">
                <div class="card-body">
                    <h5>Total</h5>
                    <h2>{{ total }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow bg-success text-white">
                <div class="card-body">
                    <h5>Legitimate</h5>
                    <h2>{{ legit }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow bg-warning text-dark">
                <div class="card-body">
                    <h5>Under Review</h5>
                    <h2>{{ review }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow bg-danger text-white">
                <div class="card-body">
                    <h5>Fraud</h5>
                    <h2>{{ fraud }}</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- TABLE -->
    <div class="card shadow p-3">
        <h5>Transaction Results</h5>
        <div style="overflow-x:auto;">
            {{ tables|safe }}
        </div>
    </div>

    <div class="mt-3">
        <a href="/" class="btn btn-secondary">⬅ Back</a>
    </div>

</div>

</body>
</html>
